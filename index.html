<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ngân Hàng Câu Hỏi Toán THPT</title><script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script><script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.navbar{background:rgba(255,255,255,0.98);box-shadow:0 10px 40px rgba(0,0,0,0.15);padding:20px;margin-bottom:30px;border-radius:12px}.navbar h1{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:2em;letter-spacing:-0.5px}.container{max-width:1100px;margin:0 auto}.header{color:white;text-align:center;margin-bottom:40px}.header h2{font-size:2.8em;margin-bottom:12px;font-weight:700}.header p{font-size:1.1em;color:rgba(255,255,255,0.8)}.filter-card{background:white;padding:35px;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,0.18);margin-bottom:35px}.filter-card h3{font-size:1.3em;font-weight:600;margin-bottom:25px;color:#333}.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;margin-bottom:25px}label{font-weight:600;color:#444;display:block;margin-bottom:8px;font-size:0.95em}select,input{padding:11px 14px;border:2px solid #ddd;border-radius:8px;width:100%;font-size:1em;font-family:inherit;transition:all 0.3s}select:focus,input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,0.1)}.button-group{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}button{padding:13px 32px;font-size:1em;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all 0.3s;font-family:inherit}.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;box-shadow:0 4px 15px rgba(102,126,234,0.3)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}.btn-secondary{background:#f3f4f6;color:#374151;border:2px solid #e5e7eb;font-weight:600}.btn-secondary:hover{background:#e5e7eb}.questions-section{margin-top:35px}.section-title{color:white;font-size:1.6em;margin-bottom:25px;font-weight:700}.stats{background:linear-gradient(135deg,rgba(102,126,234,0.15),rgba(118,75,162,0.15));border:2px solid rgba(102,126,234,0.4);color:white;padding:18px;border-radius:10px;margin-bottom:25px;font-weight:700;text-align:center;font-size:1.05em}.question-card{background:white;padding:28px;margin-bottom:24px;border-radius:10px;box-shadow:0 8px 25px rgba(0,0,0,0.1);transition:all 0.3s}.question-card:hover{box-shadow:0 12px 35px rgba(0,0,0,0.15);transform:translateY(-2px)}.question-number{font-weight:700;color:#667eea;font-size:1.15em;margin-bottom:12px}.question-meta{font-size:0.9em;color:#888;margin-bottom:15px}.question-text{font-size:1.15em;color:#333;margin:18px 0;line-height:1.7}.option{margin:13px 0 13px 20px;padding:12px;background:#f9fafb;border-left:4px solid #ddd;border-radius:4px;transition:all 0.2s;font-size:1.02em;line-height:1.6}.option:hover{background:#f0f4ff;border-left-color:#667eea}.option-label{font-weight:700;color:#667eea;margin-right:8px}.statement-group{margin:13px 0;padding:13px;background:#f9fafb;border-left:4px solid #ddd;border-radius:4px}.statement-text{margin-bottom:10px;font-size:1.02em;color:#333}.statement-btns{display:flex;gap:10px}.btn-true,.btn-false{padding:7px 14px;font-size:0.9em;border-radius:5px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s}.btn-true{background:#c8e6c9;color:#1b5e20}.btn-true:hover{background:#a5d6a7}.btn-false{background:#ffcccc;color:#b71c1c}.btn-false:hover{background:#ff9999}.short-answer-box{display:flex;align-items:center;gap:15px;margin:18px 0;padding:14px;background:#f0f9ff;border-radius:8px;border-left:4px solid #0ea5e9}.short-answer-input{padding:9px 12px !important;border:2px solid #0ea5e9 !important;border-radius:6px !important;font-size:1.1em !important;font-weight:600 !important;width:130px !important;text-align:center !important;background:white !important}.answer-hint{color:#0369a1;font-size:0.95em;font-style:italic}footer{text-align:center;color:rgba(255,255,255,0.7);margin-top:60px;padding:25px;border-top:1px solid rgba(255,255,255,0.2);font-size:0.95em}@media (max-width:768px){.header h2{font-size:1.8em}.filter-grid{grid-template-columns:1fr}.button-group{flex-direction:column}button{width:100%}}</style></head><body><div class="navbar"><h1>��� Ngân Hàng Câu Hỏi Toán THPT</h1></div><div class="container"><div class="header"><h2>Tạo Đề Thi Theo Chương & Bài</h2><p>Chọn nội dung và sinh đề tự động</p></div><div class="filter-card"><h3>🎯 Cấu Hình Đề Thi</h3><div class="filter-grid"><div><label for="chapter">📖 Chương</label><select id="chapter"><option value="">-- Chọn Chương --</option><option value="1">Chương 1: Khảo sát hàm số</option><option value="2">Chương 2: Hàm số lũy thừa, mũ, logarit</option><option value="3">Chương 3: Phương trình và bất phương trình</option></select></div><div><label for="lesson">📝 Bài</label><select id="lesson"><option value="">-- Chọn Bài --</option><option value="1">Bài 1: Tính đơn điệu và cực trị</option><option value="2">Bài 2: Giá trị lớn nhất, nhỏ nhất</option></select></div><div><label for="type">❓ Dạng câu hỏi</label><select id="type"><option value="">-- Chọn Dạng --</option><option value="trac-nghiem">Trắc nghiệm</option><option value="dung-sai">Đúng - Sai</option><option value="tra-loi-ngan">Trả lời ngắn</option></select></div><div><label for="quantity">🔢 Số câu hỏi</label><input type="number" id="quantity" min="1" max="50" value="5"></div></div><div class="button-group"><button class="btn-primary" onclick="generateQuestions()">🎲 Tạo Đề</button><button class="btn-secondary" onclick="resetFilters()">🔄 Đặt Lại</button></div></div><div class="questions-section"><h2 class="section-title">📋 Danh Sách Câu Hỏi</h2><div id="questionsContainer"></div></div></div><footer>© 2026 Ngân Hàng Câu Hỏi Toán THPT. Tất cả quyền được bảo lưu.</footer><script>const questionDatabase={"1_1_trac-nghiem":[{question:"Tìm miền xác định của hàm số $$f(x) = \\frac{1}{x - 1}$$",options:["$$(-\\infty, 1) \\cup (1, +\\infty)$$","$$(-\\infty, +\\infty)$$","$$(1, +\\infty)$$","$$(-\\infty, 1)$$"]},{question:"Giá trị nhỏ nhất của $$f(x) = x^2 - 4x + 7$$",options:["3","7","-1","2"]},{question:"Hàm số $$f(x) = -x^2 + 4x$$ có cực đại tại",options:["$$x = 2$$","$$x = 1$$","$$x = 0$$","Kh��ng có"]},{question:"Hàm số $$h(x) = 2x^4 - 8x^2 + 10$$ đồng biến trên",options:["$$(-\\infty, -1)$$","$$(-1, 0)$$","$$(1, +\\infty)$$","$$(0, +\\infty)$$"]}],"1_1_dung-sai":[{question:"Cho $$f(x) = x^3 - 3x^2 + 2$$. Xét các phát biểu:",statements:["Đồng biến trên $$(-\\infty, 0)$$","Nghịch biến trên $$(0, 2)$$","$$f(-1) > f(0)$$","Cực đại tại $$x=0$$, $$f(0)=2$$"]},{question:"Cho $$f(x) = 2x^3 - 3x^2 + 1$$. Xét các phát biểu:",statements:["TXĐ: $$\\mathbb{R}$$","$$f'(x) = 6x^2 - 6x$$","Cực đại tại $$x=0$$","Cực tiểu tại $$x=1$$"]}],"1_1_tra-loi-ngan":[{question:"Tìm $$m$$ để xác định trên các khoảng",answer:"-2.5",hint:"(làm tròn đến hàng phần mười)"},{question:"Tính $$P = ay_1 + by_2$$",answer:"-1.33",hint:"(làm tròn đến hàng phần trăm)"},{question:"Tìm $$m$$ để đồng biến trên khoảng",answer:"-0.5",hint:"(làm tròn đến hàng phần mười)"}]};function generateQuestions(){const chapter=document.getElementById('chapter').value;const lesson=document.getElementById('lesson').value;const type=document.getElementById('type').value;const quantity=parseInt(document.getElementById('quantity').value)||5;if(!chapter||!lesson||!type){alert('Vui lòng chọn Chương, Bài và Dạng!');return;}const key=`${chapter}_${lesson}_${type}`;const questions=questionDatabase[key]||[];if(!questions.length){alert('Không có câu hỏi!');return;}const selected=[];for(let i=0;i<Math.min(quantity,questions.length);i++){selected.push(questions[Math.floor(Math.random()*questions.length)]);}displayQuestions(selected,chapter,lesson,type);}function displayQuestions(questions,chapter,lesson,type){const container=document.getElementById('questionsContainer');const typeNames={'trac-nghiem':'Trắc nghiệm','dung-sai':'Đúng - Sai','tra-loi-ngan':'Trả lời ngắn'};let html=`<div class="stats">📊 Tổng cộng: ${questions.length} câu hỏi | Chương ${chapter} - Bài ${lesson}</div>`;questions.forEach((q,index)=>{html+=`<div class="question-card"><div class="question-number">Câu ${index + 1}</div><div class="question-meta">${typeNames[type]} - Chương ${chapter} Bài ${lesson}</div><div class="question-text">${q.question}</div>`;if(type==='dung-sai'){q.statements.forEach((s,i)=>{html+=`<div class="statement-group"><div class="statement-text"><strong>${String.fromCharCode(65+i)}.</strong> ${s}</div><div class="statement-btns"><button class="btn-true">✓ Đúng</button><button class="btn-false">✗ Sai</button></div></div>`;})}else if(type==='tra-loi-ngan'){html+=`<div class="short-answer-box"><input type="text" class="short-answer-input" placeholder="Nhập đáp án" maxlength="4"><span class="answer-hint">${q.hint}</span></div>`}else{q.options.forEach((o,i)=>{html+=`<div class="option"><span class="option-label">${String.fromCharCode(65+i)}.</span> ${o}</div>`;})}html+=`</div>`;});container.innerHTML=html;MathJax.typesetPromise();}function resetFilters(){document.getElementById('chapter').value='';document.getElementById('lesson').value='';document.getElementById('type').value='';document.getElementById('quantity').value='5';document.getElementById('questionsContainer').innerHTML='';}
</script></body></html>
