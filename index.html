<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Question Bank System</title>
    <script>
        let chapters = [];

        function addChapter() {
            const chapterName = prompt('Enter Chapter Name:');
            if (chapterName) {
                chapters.push({ name: chapterName, lessons: [] });
                updateChapterList();
            }
        }

        function addLesson(chapterIndex) {
            const lessonName = prompt('Enter Lesson Name:');
            if (lessonName) {
                chapters[chapterIndex].lessons.push({ name: lessonName, questions: [] });
                updateLessonList(chapterIndex);
            }
        }

        function addQuestion(chapterIndex, lessonIndex) {
            const question = prompt('Enter Question:');
            if (question) {
                chapters[chapterIndex].lessons[lessonIndex].questions.push(question);
                updateQuestionList(chapterIndex, lessonIndex);
            }
        }

        function updateChapterList() {
            const chapterList = document.getElementById('chapter-list');
            chapterList.innerHTML = '';
            chapters.forEach((chapter, index) => {
                const chapterItem = document.createElement('div');
                chapterItem.innerHTML = `<strong>${chapter.name}</strong> <button onclick="addLesson(${index})">Add Lesson</button>`;
                const lessonList = document.createElement('div');
                lessonList.id = 'lesson-list-' + index;
                chapterItem.appendChild(lessonList);
                chapterList.appendChild(chapterItem);
                updateLessonList(index);
            });
        }

        function updateLessonList(chapterIndex) {
            const lessonList = document.getElementById('lesson-list-' + chapterIndex);
            lessonList.innerHTML = '';
            chapters[chapterIndex].lessons.forEach((lesson, lessonIndex) => {
                const lessonItem = document.createElement('div');
                lessonItem.innerHTML = `<strong>${lesson.name}</strong> <button onclick="addQuestion(${chapterIndex}, ${lessonIndex})">Add Question</button>`;
                lessonList.appendChild(lessonItem);
                updateQuestionList(chapterIndex, lessonIndex);
            });
        }

        function updateQuestionList(chapterIndex, lessonIndex) {
            const lesson = chapters[chapterIndex].lessons[lessonIndex];
            const questionList = document.createElement('div');
            lesson.questions.forEach(question => {
                const questionItem = document.createElement('div');
                questionItem.innerText = question;
                questionList.appendChild(questionItem);
            });
            const lessonList = document.getElementById('lesson-list-' + chapterIndex);
            lessonList.appendChild(questionList);
        }

        function generateExam() {
            // Logic to filter questions and generate custom exams
        }
    </script>
</head>
<body>
    <h1>Flexible Question Bank System</h1>
    <button onclick="addChapter()">Add Chapter</button>
    <div id="chapter-list"></div>
    <button onclick="generateExam()">Generate Custom Exam</button>
</body>
</html>
