<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngân Hàng Câu Hỏi</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 30px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 100%; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 10px 5px 0 0; }
        button:hover { background: #0056b3; }
        .question-card { margin: 20px 0; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; }
        .option { margin: 10px 0; padding: 10px; background: white; border-left: 3px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Ngân Hàng Câu Hỏi Toán THPT</h1>
        
        <div class="filter-grid">
            <div>
                <label>Chương:</label>
                <select id="chapter">
                    <option value="">Chọn Chương</option>
                    <option value="1">Chương 1: Khảo sát hàm số</option>
                </select>
            </div>
            <div>
                <label>Bài:</label>
                <select id="lesson">
                    <option value="">Chọn Bài</option>
                    <option value="1">Bài 1: Tính đơn điệu</option>
                </select>
            </div>
            <div>
                <label>Dạng:</label>
                <select id="type">
                    <option value="">Chọn Dạng</option>
                    <option value="trac-nghiem">Trắc nghiệm</option>
                </select>
            </div>
            <div>
                <label>Số câu:</label>
                <input type="number" id="quantity" value="5" min="1" max="50">
            </div>
        </div>
        
        <button onclick="generate()">Tạo Đề</button>
        <button onclick="reset()">Đặt lại</button>
        
        <div id="questions"></div>
    </div>

    <script>
        const data = {
            "1_1_trac-nghiem": [
                { q: "Tìm miền xác định của $$f(x) = \\frac{1}{x-1}$$", opts: ["$(-\\infty,1)\\cup(1,+\\infty)$", "$(-\\infty,+\\infty)$", "$(1,+\\infty)$"] }
            ]
        };

        function generate() {
            const c = document.getElementById('chapter').value;
            const l = document.getElementById('lesson').value;
            const t = document.getElementById('type').value;
            
            if(!c || !l || !t) { alert('Chọn đầy đủ!'); return; }
            
            const key = `${c}_${l}_${t}`;
            const qs = data[key] || [];
            
            let html = '<h2>Câu hỏi</h2>';
            qs.forEach((q, i) => {
                html += `<div class="question-card">
                    <strong>Câu ${i+1}:</strong> ${q.q}
                    <div class="options">`;
                q.opts.forEach((o, j) => {
                    html += `<div class="option"><input type="radio" name="q${i}"> ${String.fromCharCode(65+j)}. ${o}</div>`;
                });
                html += '</div></div>';
            });
            
            document.getElementById('questions').innerHTML = html;
            MathJax.typesetPromise();
        }

        function reset() {
            document.getElementById('chapter').value = '';
            document.getElementById('lesson').value = '';
            document.getElementById('type').value = '';
            document.getElementById('questions').innerHTML = '';
        }
    </script>
</body>
</html>
